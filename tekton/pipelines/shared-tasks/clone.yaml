---
# yaml-language-server: $schema=https://kubernetes-schemas.heathcliff.eu/tekton.dev/task_v1.json
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: clone
  namespace: tekton-ci
spec:
  description: >-
    Clone the repository using the access token.
  params:
    - name: token
      type: string
      description: GitHub access token
    - name: repo
      type: string
      description: Name of the GitHub repository
    - name: directory
      type: string
      description: Directory to clone into relative to the workspace root
      default: "."
    - name: fetch_depth
      type: string
      description: Fetch depth for git clone
      default: 1
  workspaces:
    - name: repo
      description: Workspace for cloning the repository into
      mountPath: /workspaces/repo
  steps:
    - name: clone
      image: ghcr.io/heathcliff26/gh-utility:v0.0.3@sha256:7fc5f6c7dd06ab13441e887a830d38bbe0a8b2115c9193082749a1c9ba2ddb6c
      timeout: 5m
      env:
        - name: GITHUB_TOKEN
          value: $(params.token)
        - name: GITHUB_REPO
          value: $(params.repo)
        - name: GITHUB_DIRECTORY
          value: $(workspaces.repo.path)/$(params.directory)
        - name: GITHUB_FETCH_DEPTH
          value: $(params.fetch_depth)
      script: |
        #!/bin/sh

        gh repo clone "heathcliff26/${GITHUB_REPO}" "${GITHUB_DIRECTORY}" -- --depth "${GITHUB_FETCH_DEPTH}"
