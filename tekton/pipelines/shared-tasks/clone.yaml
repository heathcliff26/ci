---
# yaml-language-server: $schema=https://kubernetes-schemas.heathcliff.eu/tekton.dev/task_v1.json
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: clone
  namespace: tekton-ci
spec:
  description: >-
    Clone the repository using the access token.
  params:
    - name: token
      type: string
      description: GitHub access token
    - name: repo
      type: string
      description: Name of the GitHub repository
    - name: directory
      type: string
      description: Directory to clone into relative to the workspace root
      default: "."
    - name: fetch_depth
      type: string
      description: Fetch depth for git clone
      default: 1
  workspaces:
    - name: repo
      description: Workspace for cloning the repository into
      mountPath: /workspaces/repo
  steps:
    - name: clone
      image: ghcr.io/heathcliff26/gh-utility:v0.0.5@sha256:fa925454cffbc52c5c198bfb14fc9f842338e658fa7c4a0746ee0ddc3dd73633
      timeout: 5m
      env:
        - name: GITHUB_TOKEN
          value: $(params.token)
        - name: GITHUB_REPO
          value: $(params.repo)
        - name: GITHUB_DIRECTORY
          value: $(workspaces.repo.path)/$(params.directory)
        - name: GITHUB_FETCH_DEPTH
          value: $(params.fetch_depth)
      script: |
        #!/bin/sh

        gh-utility clone --depth "${GITHUB_FETCH_DEPTH}" "https://github.com/heathcliff26/${GITHUB_REPO}.git" "${GITHUB_DIRECTORY}"
