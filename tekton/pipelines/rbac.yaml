---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trigger-robot
  namespace: tekton-ci
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trigger-robot-eventlistener
  namespace: tekton-ci
subjects:
- kind: ServiceAccount
  name: trigger-robot
  namespace: tekton-ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trigger-robot-eventlistener
subjects:
- kind: ServiceAccount
  name: trigger-robot
  namespace: tekton-ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
