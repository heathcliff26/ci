---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kube-upgrade-link-check
  namespace: tekton-ci
spec:
  schedule: "12 0 * * 0"
  timezone: "Europe/Berlin"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: curl
            image: quay.io/curl/curl:8.21.0
            args: ["curl", "-X", "POST", "--data", '{"pipeline": "link-check", "repo": "kube-upgrade", "exclude-paths": "vendor"}', "el-cron.tekton-ci.svc.cluster.local:8080"]
          restartPolicy: Never
