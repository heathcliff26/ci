---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: simple-fileserver-link-check
  namespace: tekton-pipelines
spec:
  schedule: "17 0 * * 0"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: curl
            image: quay.io/curl/curl:8.20.0
            args: ["curl", "-X", "POST", "--data", '{"pipeline": "link-check", "repo": "simple-fileserver"}', "el-cron.tekton-pipelines.svc.cluster.local:8080"]
          restartPolicy: Never
