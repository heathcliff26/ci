---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: infraspace-savegame-editor-renovate
  namespace: tekton-ci
spec:
  schedule: "9 * 13 * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: curl
            image: quay.io/curl/curl:8.20.0
            args: ["curl", "-X", "POST", "--data", '{"pipeline": "renovate", "repo": "infraspace-savegame-editor"}', "el-cron.tekton-ci.svc.cluster.local:8080"]
          restartPolicy: Never
