---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minecraft-exporter-renovate
  namespace: tekton-ci
spec:
  schedule: "15 * 13 * *"
  timezone: "Europe/Berlin"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: curl
            image: quay.io/curl/curl:8.20.0
            args: ["curl", "-X", "POST", "--data", '{"pipeline": "renovate", "repo": "minecraft-exporter"}', "el-cron.tekton-ci.svc.cluster.local:8080"]
          restartPolicy: Never
