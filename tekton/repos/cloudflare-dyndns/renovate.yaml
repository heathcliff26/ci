---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cloudflare-dyndns-renovate
  namespace: tekton-ci
spec:
  schedule: "3 * 12 * *"
  timezone: "Europe/Berlin"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: curl
            image: quay.io/curl/curl:8.21.0
            args: ["curl", "-X", "POST", "--data", '{"pipeline": "renovate", "repo": "cloudflare-dyndns"}', "el-cron.tekton-ci.svc.cluster.local:8080"]
          restartPolicy: Never
