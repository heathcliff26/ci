---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: go-wol-renovate
  namespace: tekton-ci
spec:
  schedule: "6 * 13 * *"
  timezone: "Europe/Berlin"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: curl
            image: quay.io/curl/curl:8.20.0
            args: ["curl", "-X", "POST", "--data", '{"pipeline": "renovate", "repo": "go-wol"}', "el-cron.tekton-ci.svc.cluster.local:8080"]
          restartPolicy: Never
