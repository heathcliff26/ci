---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: containers-link-check
  namespace: tekton-ci
spec:
  schedule: "4 0 * * 0"
  timezone: "Europe/Berlin"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: curl
            image: quay.io/curl/curl:8.21.0
            args: ["curl", "-X", "POST", "--data", '{"pipeline": "link-check", "repo": "containers", "exclude-links": "gitlab.alpinelinux.org/alpine/infra/docker/unbound"}', "el-cron.tekton-ci.svc.cluster.local:8080"]
          restartPolicy: Never
