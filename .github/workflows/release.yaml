---
name: Release

on:
  workflow_call:
    inputs:
      draft:
        description: "Create draft release"
        type: boolean
        default: true
      prerelease:
        description: "Mark as prerelease"
        type: boolean
        default: false
      update:
        description: "Update existing release"
        type: boolean
        default: false
      tag:
        description: "Release tag to use"
        type: string
        required: true
      release-artifacts:
        description: "Artifacts to append, downloaded artifacts are found in release/. Takes comma separated list"
        type: string
        required: false
        default: "release/*"
      artifacts:
        description: "Artifacts to download. Artifacts will be downloaded into release/"
        type: string
        required: false
        default: "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      COSIGN_PRIVATE_KEY: "${{ secrets.COSIGN_PRIVATE_KEY }}"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release
          pattern: "${{ inputs.artifacts }}"
          merge-multiple: true

      - name: Install Cosign
        if: ${{ env.COSIGN_PRIVATE_KEY != '' }}
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign artifacts with Cosign
        if: ${{ env.COSIGN_PRIVATE_KEY != '' }}
        env:
          COSIGN_PASSWORD: "${{ secrets.COSIGN_PASSWORD }}"
        run: |
          set -ex
          pushd release
          for file in *; do
            cosign sign-blob "${file}" --bundle "${file}.sigstore.json" --key env://COSIGN_PRIVATE_KEY --yes
            chmod 644 "${file}.sigstore.json"
          done
          popd

      - uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          allowUpdates: ${{ inputs.update }}
          artifacts: "${{ inputs.release-artifacts }}"
          artifactErrorsFailBuild: true
          draft: ${{ inputs.draft }}
          generateReleaseNotes: true
          tag: "${{ inputs.tag }}"
          prerelease: ${{ inputs.prerelease }}
