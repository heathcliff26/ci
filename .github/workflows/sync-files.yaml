---
name: "Sync Files"

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: "35 5 * * 0"
  push:
    branches: ["main"]
    paths:
      - .github/sync.yaml
      - .github/ISSUE_TEMPLATE
      - .github/release.yaml
      - .editorconfig
      - .vscode/*
      - .golangci.yml

jobs:
  sync:
    name: Sync Files
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: "${{ secrets.BOT_APP_CLIENT_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Run GitHub File Sync
        uses: BetaHuhn/repo-file-sync-action@8b92be3375cf1d1b0cd579af488a9255572e4619 # v1.21.1
        with:
          GH_INSTALLATION_TOKEN: "${{ steps.app-token.outputs.token }}"
          CONFIG_PATH: ".github/sync.yaml"
          ASSIGNEES: "heathcliff26"
          COMMIT_EACH_FILE: "false"
          GIT_EMAIL: "<bot-ahsoka[bot]@users.noreply.github.com>"
          GIT_USERNAME: "bot-ahsoka[bot]"
