---
name: "Push Helm Chart"

on:
  workflow_call:
    inputs:
      path:
        description: "The path to the Helm chart"
        type: string
        default: "manifests/helm"
        required: false
      tag:
        description: "The version under which to push the Helm chart"
        type: string
        required: true
      name:
        description: "The name of the helm chart"
        type: string
        default: "${{ github.event.repository.name }}"
        required: false
      dry-run:
        description: "Use to disable pushing"
        type: boolean
        default: false
        required: false

jobs:
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      COSIGN_PRIVATE_KEY: "${{ secrets.COSIGN_PRIVATE_KEY }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Log in to the ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ ! inputs.dry-run }}
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Install Cosign
        if: ${{ env.COSIGN_PRIVATE_KEY != '' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Push Helm chart to registries
        run: |
          set -ex

          helm dependency build "${{ inputs.path }}"
          helm package "${{ inputs.path }}" --version "${{ inputs.tag }}" --app-version "${{ inputs.tag }}" --destination .
          if [ "${{ inputs.dry-run }}" = true ]; then
            echo "Dry run enabled, skipping push"
            exit 0
          fi
          helm push "${{ inputs.name }}-${{ inputs.tag }}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/manifests" 2>&1 | tee -a helm-push-out.txt

      - name: Sign artifacts with Cosign
        if: ${{ env.COSIGN_PRIVATE_KEY != '' }}
        env:
          COSIGN_PASSWORD: "${{ secrets.COSIGN_PASSWORD }}"
        run: |
          set -ex
          IMAGE="$(grep "Pushed:" helm-push-out.txt | awk '{print $2}')"
          DIGEST="$(grep "Digest:" helm-push-out.txt | awk '{print $2}')"
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes "${IMAGE}@${DIGEST}"
