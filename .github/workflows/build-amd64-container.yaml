---
name: "Build Container for amd64 only"

on:
  workflow_call:
    inputs:
      app:
        description: "The name of the app"
        type: string
        default: "${{ github.event.repository.name }}"
        required: false
      context:
        description: "The folder to build in"
        type: string
        default: "."
        required: false
      dockerfile:
        description: "Use to override Dockerfile path"
        type: string
        default: "Dockerfile"
        required: false
      tag:
        description: "Use to set tag, default: rolling"
        type: string
        default: "rolling"
        required: false
      tags:
        description: "Use to set multiple tags, always includes tag, defaults to latest if main branch"
        type: string
        default: "type=raw,value=latest,enable={{is_default_branch}}"
        required: false
      build-args:
        description: "Set build-args, can be multiline string"
        type: string
        default: ""
        required: false
      dry-run:
        description: "Use to disable pushing"
        type: boolean
        default: false
        required: false

jobs:
  build-images:
    runs-on: "ubuntu-latest"
    env:
      DOCKER_USERNAME: "${{ secrets.DOCKER_USERNAME }}"
      QUAY_USERNAME: "${{ secrets.QUAY_USERNAME }}"
      COSIGN_PRIVATE_KEY: "${{ secrets.COSIGN_PRIVATE_KEY }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to the ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ ! inputs.dry-run }}
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Log in to the Dockerhub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ ! inputs.dry-run && env.DOCKER_USERNAME != '' }}
        with:
          username: "${{ secrets.DOCKER_USERNAME }}"
          password: "${{ secrets.DOCKER_TOKEN }}"

      - name: Log in to Quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ ! inputs.dry-run && env.QUAY_USERNAME != '' }}
        with:
          registry: quay.io
          username: "${{ secrets.QUAY_USERNAME }}"
          password: "${{ secrets.QUAY_TOKEN }}"

      - name: Create list of repositories
        id: repos
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT

          echo "ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}" >> $GITHUB_OUTPUT
          if [ -n "${{ env.DOCKER_USERNAME }}" ]; then
            echo "${{ secrets.DOCKER_USERNAME }}/${{ inputs.app }}" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ env.QUAY_USERNAME }}" ]; then
            echo "quay.io/${QUAY_USERNAME%+*}/${{ inputs.app }}" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract org.opencontainers.* labels already set in Dockerfile
        id: labels
        run: |
          echo "labels<<EOF" >> $GITHUB_OUTPUT
          grep 'org.opencontainers.' "${{ inputs.context }}/${{ inputs.dockerfile }}" | sed 's/LABEL//g' | tr -d '\\' | tr -s [:space:] | tr -d '"' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.repos.outputs.repos }}
          tags: |
            "${{ inputs.tag }}"
            "${{ inputs.tags }}"
          labels: ${{ steps.labels.outputs.labels }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: "${{ inputs.context }}"
          platforms: "linux/amd64"
          file: "${{ inputs.context }}/${{ inputs.dockerfile }}"
          push: ${{ ! inputs.dry-run }}
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          build-args: "${{ inputs.build-args }}"
          provenance: false
          sbom: false

      - name: Install Cosign
        if: ${{ ! inputs.dry-run && env.COSIGN_PRIVATE_KEY != '' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.6.3'

      - name: Sign images with Cosign
        if: ${{ ! inputs.dry-run && env.COSIGN_PRIVATE_KEY != '' }}
        env:
          TAGS: "${{ steps.meta.outputs.tags }}"
          COSIGN_PASSWORD: "${{ secrets.COSIGN_PASSWORD }}"
        run: |
          set -ex
          readarray -t tags <<< $(echo -e "${TAGS}")
          for tag in "${tags[@]}"; do
            DIGEST="$(docker buildx imagetools inspect ${tag} | grep Digest: | awk '{print $2}')"
            cosign sign --key env://COSIGN_PRIVATE_KEY --recursive --yes "${tag}@${DIGEST}"
          done
