---
name: "Editorconfig Check"

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: ["main", "renovate/**"]
  pull_request:
    branches: ["main"]
  merge_group:
    branches: ["main"]

jobs:
  check-editorconfig:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run editorconfig-checker
        uses: docker://mstruebing/editorconfig-checker:v3.8.0
        with:
          args: ec --exclude="\.git\/(.*)|vendor\/(.*)"
