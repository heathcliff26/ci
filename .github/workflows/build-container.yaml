---
name: "Build Container"

on:
  workflow_call:
    inputs:
      app:
        description: "The name of the app"
        type: string
        default: "${{ github.event.repository.name }}"
        required: false
      context:
        description: "The folder to build in"
        type: string
        default: "."
        required: false
      dockerfile:
        description: "Use to override Dockerfile path"
        type: string
        default: "Dockerfile"
        required: false
      tag:
        description: "Use to set tag, default: rolling"
        type: string
        default: "rolling"
        required: false
      tags:
        description: "Use to set multiple tags, always includes tag, defaults to latest if main branch"
        type: string
        default: "type=raw,value=latest,enable={{is_default_branch}}"
        required: false
      build-args:
        description: "Set build-args, can be multiline string"
        type: string
        default: ""
        required: false
      dry-run:
        description: "Use to disable pushing"
        type: boolean
        default: false
        required: false

jobs:
  build-images:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    env:
      DOCKER_USERNAME: "${{ secrets.DOCKER_USERNAME }}"
      QUAY_USERNAME: "${{ secrets.QUAY_USERNAME }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to the ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ ! inputs.dry-run }}
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Log in to the Dockerhub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ ! inputs.dry-run && env.DOCKER_USERNAME != '' }}
        with:
          username: "${{ secrets.DOCKER_USERNAME }}"
          password: "${{ secrets.DOCKER_TOKEN }}"

      - name: Log in to Quay.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ ! inputs.dry-run && env.QUAY_USERNAME != '' }}
        with:
          registry: quay.io
          username: "${{ secrets.QUAY_USERNAME }}"
          password: "${{ secrets.QUAY_TOKEN }}"

      - name: Create list of repositories
        id: repos
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT

          echo "ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}" >> $GITHUB_OUTPUT
          if [ -n "${{ env.DOCKER_USERNAME }}" ]; then
            echo "${{ secrets.DOCKER_USERNAME }}/${{ inputs.app }}" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ env.QUAY_USERNAME }}" ]; then
            echo "quay.io/${QUAY_USERNAME%+*}/${{ inputs.app }}" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract org.opencontainers.* labels already set in Dockerfile
        id: labels
        run: |
          echo "labels<<EOF" >> $GITHUB_OUTPUT
          grep 'org.opencontainers.' "${{ inputs.context }}/${{ inputs.dockerfile }}" | sed 's/LABEL//g' | tr -d '\\' | tr -s [:space:] | tr -d '"' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.repos.outputs.repos }}
          tags: |
            "${{ inputs.tag }}"
            "${{ inputs.tags }}"
          labels: ${{ steps.labels.outputs.labels }}

      - name: Add arch to tags
        id: tags
        env:
          TAGS: "${{ steps.meta.outputs.tags }}"
          ARCH: "${{ matrix.arch }}"
        run: |
          set -ex
          readarray -t tags <<< $(echo -e "${TAGS}")
          echo 'tags<<EOF' >> $GITHUB_OUTPUT
          for tag in "${tags[@]}"; do
            echo "$tag-$ARCH" >> $GITHUB_OUTPUT
          done
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: "${{ inputs.context }}"
          platforms: "linux/${{ matrix.arch }}"
          file: "${{ inputs.context }}/${{ inputs.dockerfile }}"
          push: ${{ ! inputs.dry-run }}
          tags: "${{ steps.tags.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          build-args: "${{ inputs.build-args }}"
          provenance: false
          sbom: false

  combine-manifests:
    runs-on: ubuntu-latest
    needs:
      - build-images
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      COSIGN_PRIVATE_KEY: "${{ secrets.COSIGN_PRIVATE_KEY }}"
    steps:
      - name: Log in to the ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ ! inputs.dry-run }}
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Log in to the Dockerhub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ ! inputs.dry-run && env.DOCKER_USERNAME != '' }}
        with:
          username: "${{ secrets.DOCKER_USERNAME }}"
          password: "${{ secrets.DOCKER_TOKEN }}"

      - name: Log in to Quay.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ ! inputs.dry-run && env.QUAY_USERNAME != '' }}
        with:
          registry: quay.io
          username: "${{ secrets.QUAY_USERNAME }}"
          password: "${{ secrets.QUAY_TOKEN }}"

      - name: Install Cosign
        if: ${{ ! inputs.dry-run && env.COSIGN_PRIVATE_KEY != '' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.6.3'

      - name: Create list of repositories
        id: repos
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT

          echo "ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}" >> $GITHUB_OUTPUT
          if [ -n "${{ env.DOCKER_USERNAME }}" ]; then
            echo "${{ secrets.DOCKER_USERNAME }}/${{ inputs.app }}" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ env.QUAY_USERNAME }}" ]; then
            echo "quay.io/${QUAY_USERNAME%+*}/${{ inputs.app }}" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.repos.outputs.repos }}
          tags: |
            "${{ inputs.tag }}"
            "${{ inputs.tags }}"

      - name: Combine manifests
        if: ${{ ! inputs.dry-run }}
        env:
          TAGS: "${{ steps.meta.outputs.tags }}"
        run: |
          set -ex
          readarray -t tags <<< $(echo -e "${TAGS}")
          for tag in "${tags[@]}"; do
            docker buildx imagetools create -t "$tag" \
              "$tag-amd64" \
              "$tag-arm64"
          done

      - name: Sign images with Cosign
        if: ${{ ! inputs.dry-run && env.COSIGN_PRIVATE_KEY != '' }}
        env:
          TAGS: "${{ steps.meta.outputs.tags }}"
          COSIGN_PASSWORD: "${{ secrets.COSIGN_PASSWORD }}"
        run: |
          set -ex
          readarray -t tags <<< $(echo -e "${TAGS}")
          for tag in "${tags[@]}"; do
            DIGEST="$(docker buildx imagetools inspect ${tag} | grep Digest: | awk '{print $2}')"
            cosign sign --key env://COSIGN_PRIVATE_KEY --recursive --yes "${tag}@${DIGEST}"
          done
